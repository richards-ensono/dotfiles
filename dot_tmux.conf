# Managed by chezmoi. Keep the real tmux configuration in XDG config.
set-environment -g TMUX_CONF "$HOME/.config/tmux/tmux.conf"
set-environment -g TMUX_CONF_LOCAL "$HOME/.config/tmux/tmux.conf.local"
source-file "$HOME/.config/tmux/tmux.conf"

# Source the local overrides synchronously as well. Oh my tmux sources this file
# from a run-shell hook, which is too late for the initial pane's TERM value.
source-file "$HOME/.config/tmux/tmux.conf.local"
